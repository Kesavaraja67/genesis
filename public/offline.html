<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | GenesIs</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background-color: #0a0a0f;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #12121a;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-top: 0; color: #7c3aed; }
        p { color: #94a3b8; line-height: 1.5; }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: #7c3aed;
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #6d28d9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>You are Offline</h1>
        <p>Genesis requires an active internet connection to communicate with the config runtime and render engine.</p>
        <p>Please check your network and try again.</p>
        <a href="/" class="btn" onclick="window.location.reload(); return false;">Retry Connection</a>
    </div>
</body>
</html>
